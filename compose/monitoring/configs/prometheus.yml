# Глобальні налаштування Prometheus
global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    monitor: monitoring-stack

# Файли з правилами алертів
rule_files:
  - "alerts.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Моніторинг серверів через node_exporter
  - job_name: "node_exporter"
    static_configs:
      - targets:
          # Замінити на реальні IP
          - "server1:9100"
          - "server2:9100"
