- name: Deploy ansible stack
  hosts: monitoring_node
  become: true

  vars:
    monitoring_dir: /opt/monitoring

  tasks:

    - name: Ensure monitoring directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ monitoring_dir }}"
        - "{{ monitoring_dir }}/configs"
        - "{{ monitoring_dir }}/data"

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: ../../compose/monitoring/docker-compose.yml
        dest: "{{ monitoring_dir }}/docker-compose.yml"

    - name: Copy configs
      ansible.builtin.copy:
        src: ../../compose/monitoring/configs/
        dest: "{{ monitoring_dir }}/configs/"

    - name: Start ansible stack
      community.docker.docker_compose_v2:
        project_src: "{{ monitoring_dir }}"
        state: present
      when: not ansible_check_mode
